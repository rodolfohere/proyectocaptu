  <!-- React 18 -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>

  <script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;
const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
  XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;



/* ── CONFIG ─────────────────────────────────────────── */
const WA_NUMBER  = "584122060825";
const NTFY_TOPIC = "cactus-burger-charallave";
const OWNER_PIN  = "1234";

/* ── REWARDS ─────────────────────────────────────────── */
const REWARDS = [

  { pts:120, label:"Hamburguesa Simple Gratis", emoji:"🍔", color:"#10B981" },
  { pts:180, label:"Combo con Descuento",       emoji:"🎊", color:"#8B5CF6" },
];

/* ── MENU ────────────────────────────────────────────── */
const CATS = [
  { id:"combos", label:"Combos", emoji:"🎁", items:[
    { id:"c1", emoji:"🌵", name:"Combo Cactus",  desc:"2 Hamburgesas Simple + 2 Papelón con Limón",    price:5.50, isCombo:true },
    { id:"c2", emoji:"🔥", name:"Combo Fuego",   desc:"2 Hamburguesas de Carne + 2 Refrescos",         price:8.00, isCombo:true },
    { id:"c3", emoji:"🌭", name:"Combo Perrito", desc:"2 Perros Esp. + 2 Salchipapas Sencilla",        price:9.00, isCombo:true },
    { id:"c4", emoji:"⚡", name:"Combo Rápido",  desc:"1 Hamburguesa Simple + 1 Malta + 1 Papas",      price:4.00, isCombo:true },
  ]},
  { id:"hamburguesas", label:"Hamburguesas", emoji:"🍔", items:[
    { id:1, emoji:"🥩", name:"Hamburguesa de Carne",    desc:"Jugosa carne de res a la parrilla",       price:3.50 },
    { id:2, emoji:"🍗", name:"Hamburguesa de Pollo",    desc:"Pollo crujiente con aderezos de la casa", price:3.00 },
    { id:3, emoji:"🐷", name:"Hamburguesa de Cerdo",    desc:"Cerdo tierno con salsa especial",         price:3.50 },
    { id:4, emoji:"🍔", name:"Hamburguesa Simple",      desc:"Clásica y deliciosa",                     price:2.00 },
  ]},
  { id:"salchipapas", label:"Salchipapas", emoji:"🍟", items:[
    { id:5, emoji:"🍟", name:"Salchipapas Sencilla", desc:"Papas doradas con salchicha",           price:2.50 },
    { id:6, emoji:"⭐", name:"Salchipapas Especial", desc:"Con queso, salsas y toppings premium",  price:3.50 },
  ]},
  { id:"perros", label:"Perros Calientes", emoji:"🌭", items:[
    { id:7, emoji:"🌭", name:"Perro Caliente Simple",   desc:"Clásico con mostaza y kétchup",         price:2.00 },
    { id:8, emoji:"🌟", name:"Perro Caliente Especial", desc:"Con topping completo y salsa especial", price:3.00 },
  ]},
  { id:"bebidas", label:"Bebidas", emoji:"🥤", items:[
    { id:9,  emoji:"🍺", name:"Malta",             desc:"Refrescante malta bien fría",    price:1.00 },
    { id:10, emoji:"🍋", name:"Papelón con Limón", desc:"Bebida tradicional venezolana",  price:1.00 },
    { id:11, emoji:"🥤", name:"Refresco",          desc:"Tu sabor preferido bien helado", price:1.00 },
  ]},
  { id:"extras", label:"Extras", emoji:"✨", items:[
    { id:12, emoji:"🍟", name:"Ración de Papas Fritas", desc:"Crujientes papas doradas al momento", price:1.50 },
  ]},
];

const PAYMENTS = [
  { id:"efectivo",      label:"Efectivo",      icon:"💵" },
  { id:"pago-movil",    label:"Pago Móvil",    icon:"📱" },
  { id:"transferencia", label:"Transferencia", icon:"🏦" },
  { id:"zelle",         label:"Zelle",         icon:"💸" },
  { id:"binance",       label:"Binance",       icon:"🔶" },
];

const EXP_CATS = [
  { id:"ingredientes", label:"Ingredientes", icon:"🥩" },
  { id:"empaque",      label:"Empaque",      icon:"📦" },
  { id:"servicios",    label:"Servicios",    icon:"⚡" },
  { id:"transporte",   label:"Transporte",   icon:"🚗" },
  { id:"limpieza",     label:"Limpieza",     icon:"🧴" },
  { id:"otros",        label:"Otros",        icon:"📋" },
];

const C = {
  bg:"#0C0C10", sf:"#16161D", hi:"#1E1E28",
  gold:"#F5A623", green:"#2EBD6B", red:"#E74C3C",
  blue:"#3B82F6", purple:"#8B5CF6",
  white:"#F5F5F7", muted:"#6B7280", light:"#A1A1AA", border:"#26262E",
};
const PIE_COLORS = [C.gold, C.green, C.blue, C.purple, C.red];

/* ── UTILS ───────────────────────────────────────────── */
const fmt  = n => "$" + Number(n).toFixed(2);
const pad  = n => String(n).padStart(3,"0");
const dkey = () => new Date().toISOString().split("T")[0];
const tstr = () => new Date().toLocaleTimeString("es-VE",{hour:"2-digit",minute:"2-digit"});
const lsGet = (k, d=null) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch { return d; }};
const lsSet = (k, v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };

/* ── CLUB HELPERS ────────────────────────────────────── */
const cp    = p  => p.replace(/\D/g,"");
const getCl = p  => lsGet("cb-club-"+cp(p), null);
const savCl = (p,d) => lsSet("cb-club-"+cp(p), d);
const getMbr= () => lsGet("cb-mbr",[]);
const addMbr= p  => { const c=cp(p); if(!c) return; const l=getMbr(); if(!l.includes(c)) lsSet("cb-mbr",[...l,c]); };
const award = (phone, name, amount, oid) => {
  if (!cp(phone)) return null;
  const pts = Math.floor(amount);
  const ex  = getCl(phone)||{name:"",phone:cp(phone),points:0,history:[]};
  const up  = {...ex, name:name||ex.name, points:ex.points+pts,
    history:[{date:dkey(),oid,pts,total:amount},...ex.history].slice(0,40)};
  savCl(phone,up); addMbr(phone); return up;
};
const deduct = (phone, pts) => {
  const ex = getCl(phone); if(!ex) return null;
  const up = {...ex, points:Math.max(0,ex.points-pts),
    history:[{date:dkey(),oid:"CANJE",pts:-pts,total:0},...ex.history].slice(0,40)};
  savCl(phone,up); return up;
};
const nxtRw = pts => REWARDS.find(r => r.pts > pts)||null;
const wkSt  = () => { const d=new Date(); d.setDate(d.getDate()-d.getDay()+(d.getDay()===0?-6:1)); return d.toISOString().split("T")[0]; };
const moSt  = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01"; };

/* ── DAYS ────────────────────────────────────────────── */
const DAYS_ES = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

/* ── CUSTOMER MEMORY ─────────────────────────────────── */
const getCustP   = phone => lsGet("cb-cp-"+cp(phone), null);
const saveCustP  = (phone, d) => lsSet("cb-cp-"+cp(phone), d);
const getCustList= () => lsGet("cb-cp-list", []);
const regCust    = phone => { const c=cp(phone); if(!c) return; const l=getCustList(); if(!l.includes(c)) lsSet("cb-cp-list",[...l,c]); };
const updateCust = (phone, name, address, payment, delivery, total, oid) => {
  if (!cp(phone)) return;
  const ex = getCustP(phone)||{phone:cp(phone),name:"",address:"",payment:"efectivo",delivery:"retiro",totalSpent:0,orderCount:0,lastOrder:null};
  const up = {...ex, name:name||ex.name, address:address||ex.address, payment:payment||ex.payment, delivery:delivery||ex.delivery,
    totalSpent:+(ex.totalSpent+total).toFixed(2), orderCount:ex.orderCount+1, lastOrder:dkey()};
  saveCustP(phone, up); regCust(phone); return up;
};

/* ── PROMO HELPERS ───────────────────────────────────── */
const getPromos   = () => lsGet("cb-promos", []);
const savePromos  = p => lsSet("cb-promos", p);

/* ── CHART TOOLTIP ───────────────────────────────────── */
const CTip = ({active, payload, label, money}) => {
  if (!active||!payload||!payload.length) return null;
  return (
    <div style={{background:C.hi,border:"1px solid "+C.border,borderRadius:10,padding:"8px 12px"}}>
      {label ? <p style={{color:C.muted,fontSize:11,marginBottom:4}}>{label}</p> : null}
      {payload.map((p,i) => (
        <p key={i} style={{color:p.fill||p.stroke||C.gold,fontSize:13,fontWeight:800}}>
          {p.name}: {money && typeof p.value==="number" ? fmt(p.value) : p.value}
        </p>
      ))}
    </div>
  );
};

/* ── CSS ─────────────────────────────────────────────── */
const CSS = [
  "@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap');",
  "*{box-sizing:border-box;margin:0;padding:0}",
  "::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#26262E;border-radius:4px}",
  "@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.28)}100%{transform:scale(1)}}",
  "@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}",
  "@keyframes fadeUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}",
  "@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}",
  "@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}",
  ".ic{transition:transform .2s,background-color .2s}.ic:hover{transform:translateY(-2px);background-color:#1E1E28!important}",
  ".ab{transition:transform .15s,background-color .15s;cursor:pointer}.ab:hover{background-color:#E8950F!important}",
  ".ab.pop{animation:pop .38s ease}",
  ".tb{transition:color .2s;cursor:pointer}.tb:hover{color:#F5A623!important}",
  ".pk{transition:background-color .1s,transform .1s;cursor:pointer}.pk:hover{background-color:#2A2A36!important;transform:scale(1.05)}.pk:active{transform:scale(.94)}",
  ".sk{animation:shake .5s ease}",
  "input,textarea{outline:none}",
].join("\n");

/* ══════════════════════════════════════════════════════
   MAIN COMPONENT
══════════════════════════════════════════════════════ */
function App() {

  /* menu */
  const [cat,    setCat]    = useState(0);
  const [cart,   setCart]   = useState({});
  const [copen,  setCopen]  = useState(false);
  const [popped, setPopped] = useState(null);

  /* order flow: idle | checkout | sending | sent */
  const [status,  setStatus]  = useState("idle");
  const [oNum,    setONum]    = useState(null);
  const [sTotal,  setSTotal]  = useState(0);
  const [sItems,  setSItems]  = useState([]);
  const [sCust,   setSCust]   = useState(null);
  const [earned,  setEarned]  = useState(null);

  /* checkout form */
  const [cust,   setCust]   = useState({name:"",address:"",notes:"",payment:"efectivo",delivery:"retiro",phone:""});
  const [errs,   setErrs]   = useState({});

  /* club */
  const [clubOpen,   setClubOpen]   = useState(false);
  const [clubQ,      setClubQ]      = useState("");
  const [clubRes,    setClubRes]    = useState(null);
  const [clubNF,     setClubNF]     = useState(false);

  /* config */
  const [cfgWA,   setCfgWA]   = useState(WA_NUMBER);
  const [cfgNtfy, setCfgNtfy] = useState(NTFY_TOPIC);
  const [cfgPin,  setCfgPin]  = useState(OWNER_PIN);

  /* owner panel */
  const [taps,    setTaps]    = useState(0);
  const [pinOpen, setPinOpen] = useState(false);
  const [pinVal,  setPinVal]  = useState("");
  const [pinErr,  setPinErr]  = useState(false);
  const [owOpen,  setOwOpen]  = useState(false);
  const [owTab,   setOwTab]   = useState("dash");
  const [orders,  setOrders]  = useState([]);
  const [selO,    setSelO]    = useState(null);
  const [mbrs,    setMbrs]    = useState([]);
  const [selM,    setSelM]    = useState(null);
  const [dAmt,    setDAmt]    = useState("");
  const [dOk,     setDOk]     = useState(false);
  const [hSearch, setHSearch] = useState("");
  const [cfgSaved,setCfgSaved]= useState(false);
  const [nWA,     setNWA]     = useState("");
  const [nNtfy,   setNNtfy]   = useState("");
  const [nPin,    setNPin]    = useState("");
  /* egresos */
  const [expenses, setExpenses] = useState([]);
  const [expForm,  setExpForm]  = useState({type:"costo",category:"ingredientes",desc:"",amount:"",date:dkey()});
  const [expFilter,setExpFilter]= useState("week");
  const [expAdded, setExpAdded] = useState(false);
  /* cliente */
  const [foundCust, setFoundCust] = useState(null);
  /* promos */
  const [promos,    setPromos]    = useState([]);
  const [promoForm, setPromoForm] = useState({name:"",type:"pct",val:"",appliesTo:"all",catId:"hamburguesas",days:[1,2,3,4,5],active:true});
  const [promoSaved,setPromoSaved]= useState(false);

  useEffect(() => {
    const c = lsGet("cb-cfg");
    if (c) { if(c.wa) setCfgWA(c.wa); if(c.ntfy) setCfgNtfy(c.ntfy); if(c.pin) setCfgPin(c.pin); }
  }, []);

  /* cart */
  const addI = item => { setCart(p=>({...p,[item.id]:{...item,qty:(p[item.id]?.qty||0)+1}})); setPopped(item.id); setTimeout(()=>setPopped(null),380); };
  const remI = id   => setCart(p=>{const n={...p};if(n[id]?.qty>1)n[id]={...n[id],qty:n[id].qty-1};else delete n[id];return n;});
  const items = Object.values(cart);
  const count = items.reduce((s,i)=>s+i.qty,0);

  /* active promos for today */
  const todayDow   = new Date().getDay();
  const activePromos = promos.filter(p => p.active && p.days.includes(todayDow));
  const getItemPromo = item => {
    const catId = CATS.find(c=>c.items.some(i=>i.id===item.id))?.id;
    return activePromos.find(p =>
      p.appliesTo==="all" ||
      (p.appliesTo==="cat" && catId===p.catId) ||
      (p.appliesTo==="item" && String(item.id)===String(p.itemId))
    ) || null;
  };
  const effPr = (price, promo) => {
    if (!promo) return price;
    if (promo.type==="pct") return Math.max(0,+(price*(1-promo.val/100)).toFixed(2));
    if (promo.type==="fix") return Math.max(0,+(price-promo.val).toFixed(2));
    return price;
  };
  const total = items.reduce((s,i)=>s + effPr(i.price, getItemPromo(i))*i.qty, 0);

  const buildMsg = (num, its, tot, c) => {
    const lines = its.map(i=>i.qty+"x "+i.name).join("\n");
    const note  = c.notes ? "\n\u{1F4DD} "+c.notes : "";
    const pay   = PAYMENTS.find(p=>p.id===c.payment);
    const delv  = c.delivery==="delivery" ? ("\u{1F6F5} DELIVERY\n\u{1F4CD} "+c.address) : "\u{1F3EA} RETIRO EN LOCAL";
    return "🌵 *CACTUS BURGER* — Pedido #"+pad(num)+"\n👤 "+c.name+"\n"+delv+"\n"+(pay?pay.icon+" "+pay.label:c.payment)+"\n\n"+lines+note+"\n\n💰 *Total: "+fmt(tot)+"*\n⏰ "+tstr();
  };

  const confirmOrder = async () => {
    const e = {};
    if (!cust.name.trim())                                   e.name    = true;
    if (cust.delivery==="delivery" && !cust.address.trim()) e.address = true;
    setErrs(e);
    if (Object.keys(e).length) return;
    setStatus("sending");
    const num  = Math.floor(Math.random()*900)+100;
    const snap = [...items];
    const tot  = total;
    setONum(num); setSTotal(tot); setSItems(snap); setSCust({...cust});
    const order = {id:num,date:dkey(),timestamp:new Date().toISOString(),
      items:snap.map(i=>({id:i.id,name:i.name,qty:i.qty,price:i.price})),
      notes:cust.notes,customer:{...cust},total:tot};
    try { const prev=lsGet("cb-orders",[]); lsSet("cb-orders",[...prev,order]); } catch {}
    if (cust.phone) { const up=award(cust.phone,cust.name,tot,num); if(up) setEarned({pts:Math.floor(tot),total:up.points}); }
    updateCust(cust.phone, cust.name, cust.address, cust.payment, cust.delivery, tot, num);
    try { await fetch("https://ntfy.sh/"+cfgNtfy,{method:"POST",headers:{"Title":"🌵 Nuevo Pedido CACTUS BURGER","Priority":"high","Tags":"hamburger"},body:buildMsg(num,snap,tot,cust).replace(/\*/g,"")}); } catch {}
    setCart({}); setCust({name:"",address:"",notes:"",payment:"efectivo",delivery:"retiro",phone:""}); setFoundCust(null); setStatus("sent");
  };

  const sendWA = () => { if(!sCust) return; window.open("https://wa.me/"+cfgWA+"?text="+encodeURIComponent(buildMsg(oNum,sItems,sTotal,sCust)),"_blank"); };
  const reset  = () => { setStatus("idle"); setONum(null); setEarned(null); };

  /* club */
  const lookupClub = () => { const d=getCl(clubQ); if(d){setClubRes(d);setClubNF(false);}else{setClubRes(null);setClubNF(true);} };

  /* owner PIN */
  const tapLogo = () => { const n=taps+1; setTaps(n); if(n>=5){setTaps(0);setPinOpen(true);} };
  const tapKey  = k  => {
    if (k==="X") { setPinVal(p=>p.slice(0,-1)); return; }
    if (pinVal.length>=4) return;
    const next = pinVal+k; setPinVal(next);
    if (next.length===4) setTimeout(()=>{
      if (next===cfgPin) { setPinOpen(false); setPinVal(""); setPinErr(false); setOwOpen(true); loadOrders(); loadMbrs(); loadExpenses(); loadPromos(); }
      else { setPinErr(true); setTimeout(()=>{setPinErr(false);setPinVal("");},900); }
    },200);
  };

  /* owner data */
  const loadOrders = () => setOrders(lsGet("cb-orders",[]));
  const loadMbrs   = () => setMbrs(getMbr().map(p=>getCl(p)).filter(Boolean));
  const clearOrders= () => { lsSet("cb-orders",[]); setOrders([]); };
  const saveCfg    = () => {
    const c={wa:nWA||cfgWA,ntfy:nNtfy||cfgNtfy,pin:nPin||cfgPin};
    lsSet("cb-cfg",c);
    if(nWA) setCfgWA(nWA); if(nNtfy) setCfgNtfy(nNtfy); if(nPin) setCfgPin(nPin);
    setNWA(""); setNNtfy(""); setNPin(""); setCfgSaved(true); setTimeout(()=>setCfgSaved(false),2000);
  };
  const doDeduct = () => {
    if (!selM||!dAmt) return;
    const up = deduct(selM.phone,parseInt(dAmt));
    if (up) { setSelM(up); setMbrs(m=>m.map(x=>x.phone===up.phone?up:x)); setDOk(true); setDAmt(""); setTimeout(()=>setDOk(false),2000); }
  };
  /* egresos */
  const loadExpenses = () => setExpenses(lsGet("cb-exp",[]));
  const addExpense   = () => {
    if (!expForm.desc.trim()||!expForm.amount) return;
    const e = {id:Date.now(),date:expForm.date||dkey(),timestamp:new Date().toISOString(),
      type:expForm.type,category:expForm.category,desc:expForm.desc,amount:parseFloat(expForm.amount)||0};
    const prev=lsGet("cb-exp",[]); lsSet("cb-exp",[...prev,e]);
    setExpenses(ex=>[...ex,e]);
    setExpForm(f=>({...f,desc:"",amount:"",date:dkey()}));

                          <p style={{color:C.muted,fontSize:11}}>{new Date(o.timestamp).toLocaleString("es-VE",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}</p>
                          <div style={{display:"flex",gap:6,marginTop:4}}>
                            {o.customer?.delivery==="delivery" && <span style={{background:C.gold+"22",color:C.gold,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:50}}>🛵 Delivery</span>}
                            {o.customer?.payment && <span style={{background:C.hi,color:C.muted,fontSize:10,padding:"2px 8px",borderRadius:50}}>{PAYMENTS.find(p=>p.id===o.customer.payment)?.icon} {PAYMENTS.find(p=>p.id===o.customer.payment)?.label}</span>}
                          </div>
                        </div>
                        <span style={{fontFamily:"'Bebas Neue'",fontSize:20,color:C.gold,flexShrink:0}}>{fmt(o.total)}</span>
                      </div>
                      {selO?.id===o.id && (
                        <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid "+C.border}}>
                          {o.items?.map(i => <p key={i.id+i.name} style={{fontSize:12,color:C.light,marginBottom:3}}>{i.qty}x {i.name} — {fmt(i.price*i.qty)}</p>)}
                          {o.customer?.address && <p style={{fontSize:12,color:C.blue,marginTop:6}}>📍 {o.customer.address}</p>}
                          {o.notes && <p style={{fontSize:12,color:C.gold,marginTop:4}}>📝 {o.notes}</p>}
                        </div>
                      )}
                    </div>
                  ))}
                  <button onClick={clearOrders} style={{background:"transparent",border:"1px solid "+C.red,borderRadius:12,color:C.red,fontFamily:"'Nunito'",fontWeight:700,fontSize:13,padding:10,cursor:"pointer"}}>🗑️ Limpiar historial</button>
                </div>
              )}

              {/* ── CLUB PANEL ── */}
              {owTab==="club" && (
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                    {[
                      {l:"Socios",     v:mbrs.length,                                    e:"👥", c:C.gold},
                      {l:"Pts Total",  v:mbrs.reduce((s,m)=>s+m.points,0),               e:"⭐", c:C.purple},
                      {l:"Con Premio", v:mbrs.filter(m=>m.points>=REWARDS[0].pts).length, e:"🏆", c:C.green},
                    ].map(s => (
                      <div key={s.l} style={card({textAlign:"center",padding:"14px 10px"})}>
                        <p style={{fontSize:20,marginBottom:6}}>{s.e}</p>
                        <p style={{fontFamily:"'Bebas Neue'",fontSize:22,color:s.c}}>{s.v}</p>
                        <p style={{color:C.muted,fontSize:10,marginTop:2}}>{s.l}</p>
                      </div>
                    ))}
                  </div>
                  <div style={card()}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                      <h3 style={{fontWeight:800,fontSize:14,color:C.light}}>🏆 Ranking de socios</h3>
                      <button onClick={loadMbrs} style={{background:"transparent",border:"none",color:C.muted,fontSize:12,cursor:"pointer"}}>↻</button>
                    </div>
                    {mbrs.length===0 ? <p style={{color:C.muted,fontSize:13,textAlign:"center",padding:"20px 0"}}>Sin socios aún 🌵</p> : mbrs.sort((a,b)=>b.points-a.points).map((m,i) => (
                      <div key={m.phone} style={{background:selM?.phone===m.phone?C.hi:C.bg,borderRadius:14,padding:"12px 14px",marginBottom:8,cursor:"pointer",border:"1px solid "+(selM?.phone===m.phone?C.gold:C.border),transition:"all .2s"}} onClick={()=>setSelM(selM?.phone===m.phone?null:m)}>
                        <div style={{display:"flex",alignItems:"center",gap:12}}>
                          <div style={{width:32,height:32,borderRadius:"50%",background:i===0?C.gold:i===1?"#C0C0C0":i===2?"#CD7F32":C.hi,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:900,color:i<3?"#0C0C10":C.muted,flexShrink:0}}>{i<3?["🥇","🥈","🥉"][i]:i+1}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <p style={{fontWeight:800,fontSize:13}}>{m.name||"Sin nombre"}</p>
                            <p style={{color:C.muted,fontSize:11}}>{m.phone}</p>
                            {REWARDS.filter(r=>r.pts<=m.points).length>0 && (
                              <div style={{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}}>
                                {REWARDS.filter(r=>r.pts<=m.points).map(r => <span key={r.pts} style={{background:r.color+"22",color:r.color,fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:50}}>OK {r.label}</span>)}
                              </div>
                            )}
                          </div>
                          <div style={{textAlign:"right",flexShrink:0}}>
                            <p style={{fontFamily:"'Bebas Neue'",fontSize:22,color:C.gold}}>{m.points}</p>
                            <p style={{fontSize:10,color:C.muted}}>puntos</p>
                          </div>
                        </div>
                        {nxtRw(m.points) && (
                          <div style={{marginTop:10}}>
                            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.muted,marginBottom:3}}><span>{nxtRw(m.points).label}</span><span>{m.points}/{nxtRw(m.points).pts}</span></div>
                            <div style={{height:4,background:C.border,borderRadius:2}}><div style={{height:"100%",background:C.gold,borderRadius:2,width:Math.min(100,(m.points/nxtRw(m.points).pts)*100)+"%"}} /></div>
                          </div>
                        )}
                        {selM?.phone===m.phone && (
                          <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid "+C.border}} onClick={e=>e.stopPropagation()}>
                            <p style={{fontSize:13,fontWeight:700,color:C.light,marginBottom:10}}>Canjear recompensa:</p>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
                              {REWARDS.filter(r=>r.pts<=m.points).map(r => (
                                <button key={r.pts} onClick={()=>setDAmt(String(r.pts))} style={{background:r.color+"22",border:"1px solid "+r.color+"55",borderRadius:50,padding:"5px 12px",color:r.color,fontFamily:"'Nunito'",fontWeight:700,fontSize:11,cursor:"pointer"}}>{r.emoji} {r.label} (-{r.pts}pts)</button>
                              ))}
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <input value={dAmt} onChange={e=>setDAmt(e.target.value.replace(/\D/g,""))} placeholder="Pts a descontar" style={{flex:1,background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"9px 12px",color:C.white,fontFamily:"'Nunito'",fontSize:13}} />
                              <button onClick={doDeduct} style={{background:dOk?C.green:C.red,color:"#fff",border:"none",borderRadius:10,padding:"9px 16px",fontFamily:"'Nunito'",fontWeight:800,fontSize:13,cursor:"pointer",transition:"background .2s"}}>{dOk?"✅ Listo":"Canjear"}</button>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── CONFIG ── */}
              {owTab==="cfg" && (
                <div style={{display:"flex",flexDirection:"column",gap:14}}>
                  <div style={card({padding:18})}>
                    <h3 style={{fontWeight:800,fontSize:14,color:C.gold,marginBottom:16}}>⚙️ Configuración</h3>
                    {[
                      {l:"📲 WhatsApp",  s:"Actual: "+cfgWA,   v:nWA,   fn:setNWA,   ph:"58412XXXXXXX"},
                      {l:"🔔 Tema ntfy", s:"Actual: "+cfgNtfy, v:nNtfy, fn:setNNtfy, ph:"mi-tema-unico"},
                    ].map(f => (
                      <div key={f.l} style={{marginBottom:14}}>
                        <label style={{fontSize:13,fontWeight:700,color:C.light,display:"block",marginBottom:3}}>{f.l}</label>
                        <p style={{color:C.muted,fontSize:11,marginBottom:6}}>{f.s}</p>
                        <input value={f.v} onChange={e=>f.fn(e.target.value)} placeholder={f.ph} style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.white,fontFamily:"'Nunito'",fontSize:13}} />
                      </div>
                    ))}
                    <div style={{marginBottom:18}}>
                      <label style={{fontSize:13,fontWeight:700,color:C.light,display:"block",marginBottom:3}}>🔐 Nuevo PIN (4 dígitos)</label>
                      <input value={nPin} onChange={e=>setNPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="Nuevo PIN" style={{width:"100%",background:C.bg,border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.white,fontFamily:"'Nunito'",fontSize:16,letterSpacing:8}} />
                    </div>
                    <button onClick={saveCfg} style={{...goldBtn({width:"100%",padding:13,fontSize:15,borderRadius:14,background:cfgSaved?C.green:C.gold,transition:"background .3s"})}}>
                      {cfgSaved ? "✅ Guardado!" : "Guardar Cambios"}
                    </button>
                  </div>
                  <div style={card()}>
                    <h3 style={{fontWeight:800,fontSize:13,color:C.gold,marginBottom:12}}>📖 Cómo acceder al panel</h3>
                    {[["🔒","Toca el logo CACTUS BURGER 5 veces"],["🔑","Ingresa tu PIN de 4 dígitos (default: 1234)"],["📊","Accedes al panel de administración completo"],["🔔","Instala la app ntfy y suscríbete al tema para alertas en tiempo real"]].map(([e,t]) => (
                      <div key={t} style={{display:"flex",gap:10,marginBottom:10}}><span style={{fontSize:16,flexShrink:0}}>{e}</span><p style={{fontSize:13,color:C.light,lineHeight:1.5}}>{t}</p></div>
                    ))}
                  </div>
                </div>
              )}

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

  </script>
</body>
</html>
